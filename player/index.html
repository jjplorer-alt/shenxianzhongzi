<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>太上北斗真经 · 播放器</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c6af7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="北斗真经">
<link rel="apple-touch-icon" href="/icon-192.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#181820;--surface3:#1f1f2a;
  --border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --gold:#d4a853;--gold-lt:#e8c678;--gold-dk:#b08930;
  --gold-10:rgba(212,168,83,.10);--gold-20:rgba(212,168,83,.20);--gold-glow:rgba(212,168,83,.30);
  --violet:#7c6af7;--violet-10:rgba(124,106,247,.10);
  --text:#e4e4e7;--text-2:#a1a1aa;--text-3:#52525b;
  --radius:12px;
}
html,body{height:100%;font-family:'Noto Sans SC','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:0 auto;padding:16px 20px}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 0;flex-shrink:0}
.header .cover{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.header .info{flex:1;min-width:0}
.header .title{font-size:18px;font-weight:600;color:var(--gold-lt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header .artist{font-size:13px;color:var(--text-2);margin-top:2px}
.header .album{font-size:12px;color:var(--text-3);margin-top:2px}
.header .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--gold-10);color:var(--gold);border:1px solid var(--gold-20);margin-top:4px}

/* Lyrics */
.lyrics-wrap{flex:1;overflow:hidden;position:relative;margin:12px 0;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border)}
.lyrics-wrap::before,.lyrics-wrap::after{content:'';position:absolute;left:0;right:0;height:60px;z-index:2;pointer-events:none}
.lyrics-wrap::before{top:0;background:linear-gradient(var(--surface),transparent)}
.lyrics-wrap::after{bottom:0;background:linear-gradient(transparent,var(--surface))}
.lyrics{height:100%;overflow-y:auto;padding:60px 24px;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.lyrics::-webkit-scrollbar{display:none}
.lyrics .line{padding:10px 8px;font-size:15px;color:var(--text-3);transition:all .4s ease;cursor:pointer;border-radius:8px;text-align:center;line-height:1.8}
.lyrics .line:hover{color:var(--text-2);background:rgba(255,255,255,.03)}
.lyrics .line.active{color:var(--gold-lt);font-size:17px;font-weight:500;text-shadow:0 0 20px var(--gold-glow)}
.lyrics .line.passed{color:var(--text-2)}
.lyrics .loading{text-align:center;color:var(--text-3);padding:40px 0;font-size:14px}

/* Controls */
.controls{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px}

.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.time{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums;min-width:42px;text-align:center}
.progress-bar{flex:1;height:4px;background:var(--surface3);border-radius:2px;cursor:pointer;position:relative}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dk),var(--gold));border-radius:2px;position:relative;transition:width .1s linear}
.progress-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--gold-lt);border-radius:50%;opacity:0;transition:opacity .2s}
.progress-bar:hover .progress-fill::after{opacity:1}

.btn-row{display:flex;align-items:center;justify-content:center;gap:20px}
.btn{width:40px;height:40px;border:none;background:none;color:var(--text-2);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.btn svg{width:20px;height:20px;fill:currentColor}
.btn-play{width:52px;height:52px;background:var(--gold);color:var(--bg);border-radius:50%;box-shadow:0 4px 16px var(--gold-glow)}
.btn-play:hover{background:var(--gold-lt);transform:scale(1.05)}
.btn-play svg{width:24px;height:24px}

.volume-row{display:flex;align-items:center;gap:8px}
.volume-bar{width:80px;height:4px;background:var(--surface3);border-radius:2px;cursor:pointer}
.volume-fill{height:100%;background:var(--text-2);border-radius:2px}

.speed-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text-2);cursor:pointer;transition:all .2s}
.speed-btn:hover,.speed-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-10)}

/* Status */
.status{text-align:center;padding:6px 0;font-size:11px;color:var(--text-3);flex-shrink:0}
.status a{color:var(--gold);text-decoration:none;opacity:.6}
.status a:hover{opacity:1}

/* Search overlay */
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:60px 20px}
.search-overlay.open{display:flex}
.search-box{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border-hi);border-radius:16px;overflow:hidden}
.search-input-row{display:flex;align-items:center;padding:12px 16px;gap:10px;border-bottom:1px solid var(--border)}
.search-input-row input{flex:1;background:none;border:none;color:var(--text);font-size:15px;outline:none}
.search-input-row input::placeholder{color:var(--text-3)}
.search-close{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:20px;padding:4px 8px}
.search-results{max-height:400px;overflow-y:auto;padding:8px}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .2s}
.search-item:hover{background:rgba(255,255,255,.04)}
.search-item .s-cover{width:42px;height:42px;border-radius:6px;object-fit:cover;background:var(--surface3)}
.search-item .s-info{flex:1;min-width:0}
.search-item .s-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item .s-artist{font-size:12px;color:var(--text-3);margin-top:2px}

@media(max-width:600px){
  .app{padding:10px 14px}
  .header .cover{width:50px;height:50px}
  .header .title{font-size:15px}
  .lyrics .line{font-size:14px;padding:8px 6px}
  .lyrics .line.active{font-size:15px}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <img class="cover" id="cover" src="" alt="cover">
    <div class="info">
      <div class="title" id="songTitle">加载中...</div>
      <div class="artist" id="songArtist"></div>
      <div class="album" id="songAlbum"></div>
      <span class="badge">酷狗音乐</span>
    </div>
    <button class="btn" id="searchBtn" title="搜索歌曲">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
  </div>

  <div class="lyrics-wrap">
    <div class="lyrics" id="lyricsBox">
      <div class="loading">加载歌词中...</div>
    </div>
  </div>

  <div class="controls">
    <div class="progress-row">
      <span class="time" id="curTime">00:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="time" id="totalTime">00:00</span>
    </div>
    <div class="btn-row">
      <div class="volume-row">
        <button class="btn" id="muteBtn" title="静音">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.5v7a4.49 4.49 0 002.5-3.5zM14 3.23v2.06a7 7 0 010 13.42v2.06A9 9 0 0014 3.23z"/></svg>
        </button>
        <div class="volume-bar" id="volumeBar">
          <div class="volume-fill" id="volumeFill" style="width:80%"></div>
        </div>
      </div>
      <button class="btn" id="bwd15" title="后退15秒">
        <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="9" y="16" font-size="7" fill="currentColor" font-weight="bold">15</text></svg>
      </button>
      <button class="btn btn-play" id="playBtn" title="播放">
        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="btn" id="fwd15" title="快进15秒">
        <svg viewBox="0 0 24 24"><path d="M12.01 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/><text x="9" y="16" font-size="7" fill="currentColor" font-weight="bold">15</text></svg>
      </button>
      <button class="speed-btn" id="speedBtn" title="播放速度">1.0x</button>
    </div>
  </div>

  <div class="status">
    孟圆辉道长 ·《太上北斗真经》· <a href="https://m.kugou.com/share/song.html?chain=2jNA5fcFZV2" target="_blank">酷狗原链接</a>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <div class="search-input-row">
      <svg width="18" height="18" fill="#52525b" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="searchInput" type="text" placeholder="搜索歌曲、歌手..." autofocus>
      <button class="search-close" id="searchClose">&times;</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
const API = '';
const audio = document.getElementById('audio');
const lyricsBox = document.getElementById('lyricsBox');
let lyrics = [];
let currentSong = null;
let activeLine = -1;

/* ── Format time ── */
function fmt(s) {
  if (!s || isNaN(s)) return '00:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
    : `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* ── Parse LRC ── */
function parseLRC(text) {
  const result = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    const match = line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)$/);
    if (match) {
      const time = parseInt(match[1]) * 60 + parseFloat(match[2]);
      const txt = match[3].trim();
      if (txt) result.push({ time, text: txt });
    }
  }
  return result.sort((a, b) => a.time - b.time);
}

/* ── Render lyrics ── */
function renderLyrics() {
  lyricsBox.innerHTML = '';
  if (!lyrics.length) {
    lyricsBox.innerHTML = '<div class="loading">暂无歌词</div>';
    return;
  }
  lyrics.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'line';
    div.textContent = l.text;
    div.dataset.idx = i;
    div.addEventListener('click', () => {
      audio.currentTime = l.time;
      if (audio.paused) audio.play();
    });
    lyricsBox.appendChild(div);
  });
}

/* ── Sync lyrics ── */
function syncLyrics() {
  if (!lyrics.length) return;
  const ct = audio.currentTime;
  let idx = -1;
  for (let i = lyrics.length - 1; i >= 0; i--) {
    if (ct >= lyrics[i].time) { idx = i; break; }
  }
  if (idx === activeLine) return;
  activeLine = idx;

  const lines = lyricsBox.querySelectorAll('.line');
  lines.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('passed', i < idx);
  });

  if (idx >= 0 && lines[idx]) {
    const container = lyricsBox;
    const el = lines[idx];
    const offset = el.offsetTop - container.offsetTop - container.clientHeight / 2 + el.clientHeight / 2;
    container.scrollTo({ top: offset, behavior: 'smooth' });
  }
}

/* ── Load song ── */
async function loadSong(song) {
  currentSong = song || null;

  document.getElementById('songTitle').textContent = '加载中...';
  document.getElementById('songArtist').textContent = '';
  lyricsBox.innerHTML = '<div class="loading">加载歌词中...</div>';

  try {
    let config;
    if (song) {
      config = song;
    } else {
      const r = await fetch(`${API}/api/config`);
      const d = await r.json();
      config = d.data;
    }

    document.getElementById('songTitle').textContent = config.name;
    document.getElementById('songArtist').textContent = config.artist;
    document.getElementById('songAlbum').textContent = config.album || '';
    if (config.cover) {
      document.getElementById('cover').src = config.cover;
    } else {
      document.getElementById('cover').src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect fill="%23181820" width="64" height="64" rx="10"/><text x="32" y="38" text-anchor="middle" font-size="28" fill="%23d4a853">☰</text></svg>');
    }

    const hash = config.hash;
    const aid = config.album_audio_id;

    // Audio source via proxy
    audio.src = `${API}/api/audio-proxy?hash=${hash}&album_audio_id=${aid}`;

    // Load lyrics
    const lr = await fetch(`${API}/api/lyrics?hash=${hash}`);
    const ld = await lr.json();
    if (ld.status === 1) {
      lyrics = parseLRC(ld.data);
      renderLyrics();
    } else {
      lyrics = [];
      lyricsBox.innerHTML = '<div class="loading">歌词加载失败</div>';
    }

    activeLine = -1;
  } catch (e) {
    document.getElementById('songTitle').textContent = '加载失败';
    lyricsBox.innerHTML = `<div class="loading">错误: ${e.message}</div>`;
  }
}

/* ── Audio events ── */
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('curTime').textContent = fmt(audio.currentTime);
  syncLyrics();
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = fmt(audio.duration);
});

audio.addEventListener('play', () => {
  document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
});

audio.addEventListener('pause', () => {
  document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
});

/* ── Controls ── */
document.getElementById('playBtn').addEventListener('click', () => {
  if (audio.paused) audio.play(); else audio.pause();
});

document.getElementById('progressBar').addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
});

document.getElementById('bwd15').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
document.getElementById('fwd15').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 15); });

// Volume
let vol = 0.8;
audio.volume = vol;
document.getElementById('volumeBar').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  vol = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = vol;
  audio.muted = false;
  document.getElementById('volumeFill').style.width = (vol * 100) + '%';
});
document.getElementById('muteBtn').addEventListener('click', () => {
  audio.muted = !audio.muted;
  document.getElementById('volumeFill').style.width = audio.muted ? '0%' : (vol * 100) + '%';
});

// Speed
const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
let speedIdx = 2;
document.getElementById('speedBtn').addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speedBtn').textContent = speeds[speedIdx] + 'x';
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playBtn').click(); }
  if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 5);
  if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 5);
});

/* ── Search ── */
const searchOverlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
let searchTimer = null;

document.getElementById('searchBtn').addEventListener('click', () => {
  searchOverlay.classList.add('open');
  searchInput.focus();
});

document.getElementById('searchClose').addEventListener('click', () => {
  searchOverlay.classList.remove('open');
});

searchOverlay.addEventListener('click', (e) => {
  if (e.target === searchOverlay) searchOverlay.classList.remove('open');
});

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 400);
});

async function doSearch() {
  const kw = searchInput.value.trim();
  const box = document.getElementById('searchResults');
  if (!kw) { box.innerHTML = ''; return; }
  box.innerHTML = '<div style="padding:20px;text-align:center;color:#52525b">搜索中...</div>';
  try {
    const r = await fetch(`${API}/api/search?keywords=${encodeURIComponent(kw)}`);
    const d = await r.json();
    if (!d.data?.length) { box.innerHTML = '<div style="padding:20px;text-align:center;color:#52525b">无结果</div>'; return; }
    box.innerHTML = d.data.map((s, i) => `
      <div class="search-item" data-idx="${i}">
        <img class="s-cover" src="${s.cover || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 42 42\"><rect fill=\"%231f1f2a\" width=\"42\" height=\"42\" rx=\"6\"/><text x=\"21\" y=\"26\" text-anchor=\"middle\" font-size=\"16\" fill=\"%23555\">♫</text></svg>')}" onerror="this.src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 42 42\\'><rect fill=\\'%231f1f2a\\' width=\\'42\\' height=\\'42\\' rx=\\'6\\'/></svg>')">
        <div class="s-info">
          <div class="s-name">${s.name}</div>
          <div class="s-artist">${s.artist} · ${fmt(s.duration)}</div>
        </div>
      </div>
    `).join('');

    box.querySelectorAll('.search-item').forEach((el) => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.idx);
        const song = d.data[idx];
        searchOverlay.classList.remove('open');
        loadSong(song);
      });
    });
  } catch (e) {
    box.innerHTML = `<div style="padding:20px;text-align:center;color:#f43f5e">${e.message}</div>`;
  }
}

/* ── Init ── */
loadSong();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(err => console.warn('[PWA] SW 注册失败:', err));
  });
}
</script>
</body>
</html>
