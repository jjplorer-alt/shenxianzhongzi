# 推送到 main 后：并行部署 Cloudflare Pages 与 GitHub Pages（静态导出）
name: Deploy Cloudflare and GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: "deploy-site-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  cloudflare:
    runs-on: ubuntu-latest
    name: Cloudflare Pages
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: app
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://sxzz.pages.dev
        run: npm ci && npm run build

      - name: Verify build output
        run: |
          ls -la app/out
          test -d app/out && test -n "$(ls -A app/out)" || (echo "ERROR: app/out is empty or missing" && exit 1)

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy app/out --project-name=sxzz --branch=main

      - name: Deployment complete
        run: echo "✅ Cloudflare Pages: https://sxzz.pages.dev"

  github-pages:
    runs-on: ubuntu-latest
    name: GitHub Pages (build)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        working-directory: app
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm ci && npm run build

      - name: Verify build output
        run: |
          test -d app/out && test -n "$(ls -A app/out)" || (echo "ERROR: app/out is empty or missing" && exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/out

  github-pages-deploy:
    needs: github-pages
    runs-on: ubuntu-latest
    name: GitHub Pages (deploy)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
