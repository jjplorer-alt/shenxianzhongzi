# 部署到 Cloudflare Pages
# 推送到 main 分支后自动构建并部署
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整 git 历史，供 inject-sw-version 等脚本使用

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: app
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: https://shenxianzhongzi.pages.dev
        run: npm ci && npm run build

      - name: Verify build output
        run: |
          echo "Build output contents:"
          ls -la app/out
          test -d app/out && test -n "$(ls -A app/out)" || (echo "ERROR: app/out is empty or missing" && exit 1)

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy app/out --project-name=shenxianzhongzi --branch=main

      - name: Deployment complete
        run: |
          echo "✅ 部署成功！"
          echo "站点地址: https://shenxianzhongzi.pages.dev"
